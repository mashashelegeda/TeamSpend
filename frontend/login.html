<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div class="container">
        <div class="left-panel">
            <div class="overlay"></div>

            <div class="content">
                <h1>TeamSpend</h1>

                <h2>
                    Kontroluj wydatki swojego zespołu w jednym miejscu.
                </h2>

                <p>
                    TeamSpend pomaga zespołom kontrolować wspólne wydatki,
                    dodawać koszty i śledzić ich podział w prosty
                    i przejrzysty sposób.
                </p>
            </div>
        </div>

        <div class="right-panel">
            <h2 id="form-title">Logowanie</h2>

            <form class="login-form" id="login-form">
                <label>Twój email</label>
                <input type="email">

                <label>Hasło</label>
                <input type="password">

                <button type="button">Zaloguj się</button>

                <p>
                    Nie masz konta?
                    <a href="#" id="show-register">Zarejestruj się</a>
                </p>
            </form>


            <form class="login-form" id="register-form" style="display:none;">
                <label>Nazwa użytkownika</label>
                <input type="text" id="register-username">

                <label>Email</label>
                <input type="email">

                <label>Hasło</label>
                <input type="password">

                <label>Powtórz hasło</label>
                <input type="password">

                <button type="button">Zarejestruj się</button>

                <p>
                    Masz już konto?
                    <a href="#" id="show-login">Zaloguj się</a>
                </p>
            </form>
        </div>
        <script src="script.js"></script>
</body>

</html>
